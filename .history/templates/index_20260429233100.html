<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAI Credit Risk Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Credit Risk Predictor</h1>
            <p>Explainable AI (XAI) System for Loan Approval</p>
        </header>

        <main>
            <section class="form-section">
                <form id="prediction-form">
                    <div class="grid">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" name="person_age" value="25" required>
                        </div>
                        <div class="form-group">
                            <label>Annual Income</label>
                            <input type="number" name="person_income" value="50000" required>
                        </div>
                        <div class="form-group">
                            <label>Home Ownership (0-3)</label>
                            <input type="number" name="person_home_ownership" value="1" required>
                        </div>
                        <div class="form-group">
                            <label>Employment Length (Years)</label>
                            <input type="number" name="person_emp_length" value="2" required>
                        </div>
                        <div class="form-group">
                            <label>Loan Intent (0-5)</label>
                            <input type="number" name="loan_intent" value="2" required>
                        </div>
                        <div class="form-group">
                            <label>Loan Amount</label>
                            <input type="number" name="loan_amnt" value="10000" required>
                        </div>
                        <div class="form-group">
                            <label>Interest Rate</label>
                            <input type="number" step="0.01" name="loan_int_rate" value="11.0" required>
                        </div>
                        <div class="form-group">
                            <label>Percent Income</label>
                            <input type="number" step="0.01" name="loan_percent_income" value="0.2" required>
                        </div>
                        <div class="form-group">
                            <label>Historical Default (0 or 1)</label>
                            <input type="number" name="cb_person_default_on_file" value="0" required>
                        </div>
                        <div class="form-group">
                            <label>Credit History Length</label>
                            <input type="number" name="cb_person_cred_hist_length" value="3" required>
                        </div>
                    </div>
                    <button type="submit" id="submit-btn">Analyze Credit Risk</button>
                </form>
            </section>

            <section id="result-section" class="hidden">
                <div class="result-card">
                    <h2>Result: <span id="prediction-text"></span></h2>
                    <p>Risk Probability: <span id="risk-percent"></span>%</p>
                    <hr>
                    <h3>Why this decision? (XAI Explanation)</h3>
                    <div id="explanation-chart">
                        </div>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
